<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistar AI | Developed by Deepak Katal</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            height: 100vh; width: 100vw; display: flex; overflow: hidden;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .sidebar { width: 260px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .new-chat { border: 1px solid #38bdf8; color: #38bdf8; padding: 12px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .new-chat:hover { background: #38bdf8; color: #020617; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .chat-container { width: 90%; max-width: 1000px; height: 85vh; background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border-radius: 28px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 60px rgba(0,0,0,0.6); position: relative; }

        .header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.6rem; font-weight: 700; color: #38bdf8; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .msg { padding: 14px 20px; border-radius: 20px; max-width: 85%; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.4s ease; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; border-bottom-right-radius: 4px; font-weight: 500; }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        #preview-box {
            display: none; position: absolute; bottom: 95px; left: 25px;
            background: rgba(30, 41, 59, 0.95); padding: 10px; border-radius: 15px;
            border: 1px solid #38bdf8; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #preview-box img { max-height: 120px; border-radius: 10px; display: block; }
        .close-preview { position: absolute; top: -8px; right: -8px; background: #f87171; color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }

        .input-area { padding: 20px; display: flex; gap: 10px; align-items: center; background: rgba(15, 23, 42, 0.4); border-radius: 0 0 28px 28px; }
        input { flex: 1; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 18px; color: white; outline: none; }

        .icon-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .icon-btn svg { width: 22px; height: 22px; fill: #94a3b8; }
        .send-btn { background: #38bdf8; border: none; }
        .send-btn svg { fill: #0f172a; }
        
        .typing { font-size: 0.8rem; color: #38bdf8; margin: 10px 25px; display: none; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="new-chat" onclick="location.reload()">+ New Chat</div>
    <div style="color: #94a3b8; font-size: 0.85rem; margin-top: auto;">Created by Deepak Katal</div>
</div>

<div class="main-content">
    <div class="chat-container">
        <div class="header">Vistar AI</div>
        <div id="chat-box">
            <div class="msg ai-msg">Hey! I'm Vistar AI. How can I help you today?</div>
        </div>
        
        <div id="typing-ui" class="typing">Vistar is thinking...</div>

        <div id="preview-box">
            <div class="close-preview" onclick="clearFile()">×</div>
            <img id="image-display" src="" alt="Preview">
        </div>

        <div class="input-area">
            <label for="file-upload" class="icon-btn">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z""")/>></svg>
            </label>
            <input type="file" id="file-upload" style="display: none;" accept="image/*" onchange="handleFile(this)">
            
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">

            <button class="icon-btn send-btn" onclick="sendMsg()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z""")/>></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const typingUi = document.getElementById("typing-ui");
    const previewBox = document.getElementById("preview-box");
    const imageDisplay = document.getElementById("image-display");
    const fileUpload = document.getElementById("file-upload");

    let selectedFileData = null;

    function handleFile(inputElement) {
        const file = inputElement.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedFileData = e.target.result;
                imageDisplay.src = selectedFileData;
                previewBox.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    }

    function clearFile() {
        selectedFileData = null;
        fileUpload.value = "";
        previewBox.style.display = "none";
    }

    async function sendMsg() {
        const text = input.value.trim();
        const currentImage = selectedFileData; // Save image data before clearing

        if (!text && !currentImage) return;

        // 1. Show User Message in UI
        let userContent = "";
        if (currentImage) {
            userContent += `<img src="${currentImage}" style="max-width: 100%; border-radius: 10px; margin-bottom: 10px; display: block;">`;
        }
        userContent += `<span>${text}</span>`;
        chatBox.innerHTML += `<div class="msg user-msg">${userContent}</div>`;
        
        // Reset Inputs
        input.value = "";
        clearFile();
        chatBox.scrollTop = chatBox.scrollHeight;
        typingUi.style.display = "block";

        // 2. FETCH REAL RESPONSE FROM FLASK
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: text,
                    image: currentImage // Sending Base64 Image string
                })
            });

            const data = await response.json();
            
            typingUi.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            typingUi.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg">Error: Backend connection failed.</div>`;
            console.error("Fetch Error:", error);
        }
    } -->

    <!-- input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>

</script>

</body>
</html>
