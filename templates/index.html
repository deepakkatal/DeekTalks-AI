<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistar AI | Developed by Deepak Katal</title>
    <!-- Modern Font & Icons -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            height: 100vh; width: 100vw; display: flex; overflow: hidden;
            /* --- 1. Futuristic Animated Background --- */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }
        .new-chat {
            border: 1px solid #38bdf8; color: #38bdf8; padding: 12px;
            border-radius: 12px; cursor: pointer; text-align: center;
            font-weight: bold; margin-bottom: 20px; transition: 0.3s;
        }
        .new-chat:hover { background: #38bdf8; color: #020617; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* Glassmorphism Chat Container */
        .chat-container { 
            width: 90%; max-width: 1050px; height: 85vh; 
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px);
            border-radius: 28px; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); 
        }

        .header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.6rem; font-weight: 700; color: #38bdf8; }

        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 14px 20px; border-radius: 20px; max-width: 85%; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.4s ease; }
        .user-msg { align-self: flex-end; background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; border-bottom-right-radius: 4px; font-weight: 500; }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        /* Developer Name Tag */
        .dev-tag { text-align: center; padding: 10px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; text-transform: uppercase; }
        .dev-tag b { color: #38bdf8; }

        .input-area { padding: 20px; display: flex; gap: 10px; align-items: center; background: rgba(15, 23, 42, 0.4); border-radius: 0 0 28px 28px; }
        input { flex: 1; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 18px; color: white; outline: none; }

        .icon-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .icon-btn svg { width: 20px; height: 20px; fill: #94a3b8; }
        .mic-btn.active { border-color: #f87171; animation: pulse 1.5s infinite; }
        .mic-btn.active svg { fill: #f87171; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .send-btn { background: #38bdf8; border: none; }
        .send-btn svg { fill: #0f172a; }

        #ask-about-btn { display:none; position:absolute; z-index:1000; background:#38bdf8; color:#0f172a; padding:5px 12px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:0.85rem; }
        
        .typing { font-size: 0.8rem; color: #94a3b8; margin: 0 0 10px 25px; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="new-chat" onclick="location.reload()">+ New Chat</div>
    <p style="font-size: 0.7rem; color: #475569; text-transform: uppercase; margin-bottom: 10px;">Recent Chats</p>
    <div style="color: #94a3b8; font-size: 0.85rem;">Created by Deepak Katal</div>
</div>

<div class="main-content">
    <div id="ask-about-btn"><i class="fas fa-quote-left"></i> Ask about</div>
    
    <div class="chat-container">
        <div class="header">Vistar AI</div>
        <div id="chat-box">
            <div class="msg ai-msg">Hey! I'm Vistar AI. How can I help you today?</div>
        </div>
        <div id="typing-ui" class="typing">Vistar is thinking...</div>
        
        <!-- Developer Tag -->
        <div class="dev-tag">Developed by <b>Deepak Katal</b></div>

        <div class="input-area">
            <div id="mic-btn" class="icon-btn mic-btn" onclick="toggleMic()">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>></svg>
            </div>
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button class="icon-btn send-btn" onclick="sendMsg()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z""")/>></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const typingUi = document.getElementById("typing-ui");
    const micBtn = document.getElementById("mic-btn");
    const askBtn = document.getElementById("ask-about-btn");

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

    // Text Selection Logic
    document.addEventListener("mouseup", (e) => {
        let selected = window.getSelection().toString().trim();
        if (selected.length > 0) {
            askBtn.style.display = "block";
            askBtn.style.left = e.pageX + "px";
            askBtn.style.top = (e.pageY - 40) + "px";
            askBtn.onclick = () => {
                input.value = "Explain this: " + selected;
                sendMsg();
                askBtn.style.display = "none";
            };
        } else { askBtn.style.display = "none"; }
    });

    // Mic Logic
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.onstart = () => micBtn.classList.add('active');
        recognition.onresult = (e) => { input.value = e.results[0][0].transcript; sendMsg(); };
        recognition.onend = () => micBtn.classList.remove('active');
    }
    function toggleMic() { recognition ? recognition.start() : alert("Mic not supported"); }

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });

    async function sendMsg() {
        const text = input.value.trim();
        if (!text) return;
        chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";
        scrollToBottom();
        typingUi.style.display = "block";

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            typingUi.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg">${data.response}</div>`;
            scrollToBottom();
        } catch (err) {
            typingUi.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg" style="color: #f87171;">Error! Flask check karo.</div>`;
        }
    }
</script>
<script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
