<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistar AI | Developed by Deepak Katal</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- Markdown के लिए Library -->
    <script src="https://cdn.jsdelivr.net"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            height: 100vh; width: 100vw; display: flex; overflow: hidden;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sidebar {
            width: 260px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }
        .new-chat {
            border: 1px solid #38bdf8; color: #38bdf8; padding: 12px;
            border-radius: 12px; cursor: pointer; text-align: center;
            font-weight: bold; margin-bottom: 20px; transition: 0.3s;
        }
        .new-chat:hover { background: #38bdf8; color: #020617; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .chat-container { 
            width: 95%; max-width: 800px; height: 90vh; 
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px);
            border-radius: 28px; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); 
        }

        .header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.4rem; font-weight: 700; color: #38bdf8; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        .msg { padding: 14px 20px; border-radius: 18px; max-width: 85%; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.3s ease; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #38bdf8; color: #0f172a; border-bottom-right-radius: 4px; font-weight: 600; }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }

        /* Markdown Styles */
        .ai-msg h3 { color: #38bdf8; margin: 10px 0; }
        .ai-msg p { margin-bottom: 10px; }
        .ai-msg code { background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; color: #fb7185; }

        .dev-tag { text-align: center; padding: 8px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.3); }
        .dev-tag b { color: #38bdf8; }

        .input-area { padding: 15px; display: flex; gap: 10px; align-items: center; background: rgba(15, 23, 42, 0.4); border-radius: 0 0 28px 28px; }
        input { flex: 1; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 18px; color: white; outline: none; }

        .icon-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-btn.active { border-color: #f87171; animation: pulse 1s infinite; }
        .mic-btn svg { fill: #94a3b8; width: 22px; }
        .mic-btn.active svg { fill: #f87171; }

        .send-btn { background: #38bdf8; border: none; }
        .send-btn svg { fill: #0f172a; width: 22px; }

        .typing { font-size: 0.85rem; color: #38bdf8; margin: 0 0 10px 25px; display: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="new-chat" onclick="location.reload()">+ New Chat</div>
    <div style="margin-top: auto; color: #94a3b8; font-size: 0.85rem;">Created by Deepak Katal</div>
</div>

<div class="main-content">
    <div class="chat-container">
        <div class="header">Vistar AI</div>
        <div id="chat-box">
            <div class="msg ai-msg">Hey! I'm Vistar AI. Developed by Deepak Katal. How can I help you today?</div>
        </div>
        <div id="typing-ui" class="typing">Vistar is thinking...</div>
        
        <div class="dev-tag">Developed by <b>Deepak Katal</b></div>

        <div class="input-area">
            <div id="mic-btn" class="icon-btn mic-btn" onclick="toggleMic()">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>></svg>
            </div>
            <input type="text" id="user-input" placeholder="Ask Vistar anything..." autocomplete="off">
            <button class="icon-btn send-btn" onclick="sendMsg()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z""")/>></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const typingUi = document.getElementById("typing-ui");
    const micBtn = document.getElementById("mic-btn");

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

    // Mic Logic
    let recognition;
    if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
        const SpeechRecognition = window.webkitSpeechRecognition || window.speechRecognition;
        recognition = new SpeechRecognition();
        recognition.onstart = () => micBtn.classList.add('active');
        recognition.onresult = (e) => { input.value = e.results[0][0].transcript; sendMsg(); };
        recognition.onend = () => micBtn.classList.remove('active');
    }
    function toggleMic() { recognition ? recognition.start() : alert("Mic not supported"); }

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });

    async function sendMsg() {
        const text = input.value.trim();
        if (!text) return;

        chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";
        scrollToBottom();
        typingUi.style.display = "block";

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            const data = await res.json();
            typingUi.style.display = "none";

            // Python से आने वाले 'response' को साफ़ फॉर्मेट में दिखाना
            const rawReply = data.response || "Sorry, try again!";
            const formattedAnswer = marked.parse(rawReply); 

            chatBox.innerHTML += `<div class="msg ai-msg">${formattedAnswer}</div>`;
            scrollToBottom();
        } catch (err) {
            typingUi.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg" style="color:#f87171">Error: Connection lost.</div>`;
        }
    }
</script>
</body>
</html>
