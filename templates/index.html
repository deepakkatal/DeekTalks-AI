<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistar AI| Creative AI</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden; }

        .chat-container { width: 95%; max-width: 450px; height: 85vh; background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px); border-radius: 28px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(56, 189, 248, 0.1); }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 14px 20px; border-radius: 20px; max-width: 85%; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.4s ease; }
        .user-msg { align-self: flex-end; background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); font-weight: 500; }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .input-area { padding: 20px; display: flex; gap: 10px; align-items: center; background: rgba(15, 23, 42, 0.4); border-radius: 0 0 28px 28px; }
        input { flex: 1; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 18px; color: white; outline: none; }

        /* Icon Button Styling */
        .icon-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .icon-btn svg { width: 20px; height: 20px; fill: #94a3b8; }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .icon-btn:hover svg { fill: #38bdf8; }

        /* Mic Active State */
        .mic-btn.active { border-color: #f87171; box-shadow: 0 0 15px rgba(248, 113, 113, 0.4); animation: pulse 1.5s infinite; }
        .mic-btn.active svg { fill: #f87171; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Send Button Styling */
        .send-btn { background: #38bdf8; border: none; }
        .send-btn svg { fill: #0f172a; }
        .send-btn:hover { background: #fff; transform: translateY(-2px); }

        .typing { font-size: 0.8rem; color: #94a3b8; margin: 0 0 10px 25px; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">DeekTalks Pro</div>
    <div id="chat-box">
        <div class="msg ai-msg">Hey! I'm Vistar . How can I help you?</div>
    </div>
    <div id="typing-ui" class="typing">Vistar  is thinking...</div>
    
    <div class="input-area">
        <!-- Modern Mic SVG Icon -->
        <div id="mic-btn" class="icon-btn mic-btn" onclick="toggleMic()">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>></svg>
        </div>
        
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        
        <!-- Modern Arrow SVG Icon -->
        <button class="icon-btn send-btn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z""")/>></svg>
        </button>
    </div>
</div>

<script>
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const typingUi = document.getElementById("typing-ui");
    const micBtn = document.getElementById("mic-btn");

    // Microphone Logic
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.onstart = () => micBtn.classList.add('active');
        recognition.onresult = (event) => {
            input.value = event.results[0][0].transcript;
            micBtn.classList.remove('active');
            sendMsg();
        };
        recognition.onend = () => micBtn.classList.remove('active');
    }

    function toggleMic() {
        if (!recognition) return alert("Mic not supported");
        recognition.start();
    }

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });

    async function sendMsg() {
        const text = input.value.trim();
        if (!text) return;
        chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
        typingUi.style.display = "block";

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            typingUi.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (err) {
            typingUi.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg" style="color: #f87171;">Server Error!</div>`;
        }
    }
</script>
</body>
</html>
